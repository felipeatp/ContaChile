# Reemplazar TU_DOMINIO.cl con tu dominio real antes de usar
# Copiar a /etc/nginx/sites-available/contachile en el VPS
# Luego: sudo ln -s /etc/nginx/sites-available/contachile /etc/nginx/sites-enabled/

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name TU_DOMINIO.cl www.TU_DOMINIO.cl;

    # Certbot usa este path para renovar certificados
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name TU_DOMINIO.cl www.TU_DOMINIO.cl;

    ssl_certificate /etc/letsencrypt/live/TU_DOMINIO.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TU_DOMINIO.cl/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Subir archivos hasta 50MB (certificados digitales, XML DTE)
    client_max_body_size 50M;

    # Proxy al contenedor web (Next.js)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
