name: CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: contachile
          POSTGRES_PASSWORD: contachile
          POSTGRES_DB: contachile
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build
        env:
          DATABASE_URL: postgresql://contachile:contachile@localhost:5432/contachile
          CLERK_SECRET_KEY: test-key

      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://contachile:contachile@localhost:5432/contachile
          CLERK_SECRET_KEY: test-key
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          SII_BASE_URL: https://maullin.sii.cl
          SII_ENV: test
          ACEPTA_API_KEY: test-key

  build-api:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: false
          tags: contachile-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
